[package]
name = "entropy-provider"
version = "0.0.0"
edition = "2018"
description = "PsyMeter raw-entropy sidecar. Emits RAW, unconditioned bytes from a hardware source (RDSEED)."
license = "MIT"

# Intentionally ZERO dependencies: the entropy path must be trivially auditable
# and buildable offline. Uses only the standard library and core::arch intrinsics.

[[bin]]
name = "entropy-provider"
path = "src/main.rs"

[profile.release]
opt-level = 3
